<svg width="750" height="420" viewBox="0 0 750 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .card { fill: #161b22; stroke: #30363d; stroke-width: 2; rx: 20; }
    .title { fill: #f0f6fc; font-family: Inter, sans-serif; font-size: 24px; font-weight: 700; }
    .step { fill: #c9d1d9; font-family: Inter, sans-serif; font-size: 16px; }
    .label { fill: #58a6ff; font-family: Inter, sans-serif; font-size: 14px; font-weight: 600; }
    .arrow { fill: none; stroke: #58a6ff; stroke-width: 4; marker-end: url(#arrowhead); }
    .box { fill: #010409; stroke: #30363d; stroke-width: 1.5; rx: 16; }
    .hint { fill: #8b949e; font-family: Inter, sans-serif; font-size: 13px; }
  </style>
  <rect class="bg" width="750" height="420" rx="32"/>
  <rect class="card" x="30" y="30" width="690" height="220" />
  <text class="title" x="55" y="70">GitHub Pages Quick Start</text>
  <text class="step" x="55" y="105">1. Create a new repository on GitHub</text>
  <text class="hint" x="55" y="125">(Example: manual-testing-study-guide)</text>
  <rect class="box" x="50" y="140" width="650" height="58" />
  <text class="label" x="70" y="170">2. Push your code from your computer</text>
  <text class="step" x="70" y="190">git init · git add . · git commit -m "Initial commit"</text>
  <text class="step" x="70" y="210">git branch -M main · git remote add origin YOUR_URL · git push -u origin main</text>
  <rect class="box" x="50" y="208" width="650" height="62" />
  <text class="label" x="70" y="250">3. Enable GitHub Pages in Settings</text>
  <text class="step" x="70" y="270">Settings → Pages → Deploy from a branch → main / root → Save</text>
  <rect class="box" x="50" y="270" width="650" height="62" />
  <text class="label" x="70" y="305">4. Visit your site</text>
  <text class="step" x="70" y="325">https://YOUR_USERNAME.github.io/manual-testing-study-guide/</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff" />
    </marker>
  </defs>
  <path class="arrow" d="M365 180 L430 180" />
  <path class="arrow" d="M365 235 L430 235" />
  <path class="arrow" d="M365 290 L430 290" />
</svg>